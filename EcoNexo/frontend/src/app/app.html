@if (isAdminRoute()) {
  <router-outlet></router-outlet>
} @else {
  @if (!isProfileRoute()) {
    <app-header></app-header>
  }

  <main [class.no-header]="isProfileRoute()">
    <router-outlet></router-outlet>
  </main>

  @if (!isProfileRoute()) {
    <app-footer></app-footer>
  }

  <app-cart></app-cart>
}
