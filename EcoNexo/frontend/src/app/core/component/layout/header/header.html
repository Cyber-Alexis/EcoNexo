<nav class="navbar">
  <a routerLink="/" class="navbar-brand">
    <div class="logo-icon">
      <svg viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="#2D6A4F"/>
        <path d="M16 6 C8 10, 6 20, 16 26 C26 20, 24 10, 16 6Z" fill="white" opacity="0.9"/>
        <path d="M16 14 L16 26" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="brand-name">EcoNexo</span>
  </a>
  <ul class="nav-links">
    <li><a routerLink="/negocios" routerLinkActive="active">Negocios</a></li>
    <li><a routerLink="/productos" routerLinkActive="active">Productos</a></li>
    <li><a routerLink="/about" routerLinkActive="active">Sobre Nosotros</a></li>
  </ul>
  <div class="nav-right">
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 20 20" fill="none">
        <circle cx="8.5" cy="8.5" r="5.5" stroke="#9CA3AF" stroke-width="1.5"/>
        <path d="M13 13L17 17" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" placeholder="Busca negocios o productos..." />
    </div>
    <button class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none">
        <rect x="3" y="4" width="18" height="18" rx="2" stroke="#374151" stroke-width="1.5"/>
        <path d="M3 9H21" stroke="#374151" stroke-width="1.5"/>
        <path d="M8 2V6M16 2V6" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <a routerLink="/login" routerLinkActive="login-link--active" [routerLinkActiveOptions]="{ exact: true }" class="login-link">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
        <path d="M4 20C4 16.686 7.582 14 12 14C16.418 14 20 16.686 20 20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Iniciar Sesión
    </a>
    <a routerLink="/register" [class.register-btn-nav--inactive]="router.url.startsWith('/login')" class="register-btn-nav">
      Registrarse
    </a>
  </div>
</nav>
