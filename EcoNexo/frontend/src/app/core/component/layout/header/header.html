<nav class="navbar">
  <a routerLink="/" class="navbar-brand">
    <div class="logo-icon">
      <svg viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="#2D6A4F"/>
        <path d="M16 6 C8 10, 6 20, 16 26 C26 20, 24 10, 16 6Z" fill="white" opacity="0.9"/>
        <path d="M16 14 L16 26" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="brand-name">EcoNexo</span>
  </a>
  <ul class="nav-links">
    <li><a routerLink="/negocios" routerLinkActive="active">Negocios</a></li>
    <li><a routerLink="/productos" routerLinkActive="active">Productos</a></li>
    <li><a routerLink="/about" routerLinkActive="active">Sobre Nosotros</a></li>
  </ul>
  <div class="nav-right">
    <button class="icon-btn cart-btn" (click)="openCart()" aria-label="Abrir carrito">
      <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" stroke="#374151" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="3" y1="6" x2="21" y2="6" stroke="#374151" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M16 10a4 4 0 0 1-8 0" stroke="#374151" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      @if (cartCount > 0) {
        <span class="cart-badge">{{ cartCount }}</span>
      }
    </button>
    @if (!isLoggedIn) {
      <a routerLink="/login" routerLinkActive="login-link--active" [routerLinkActiveOptions]="{ exact: true }" class="login-link">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
          <path d="M4 20C4 16.686 7.582 14 12 14C16.418 14 20 16.686 20 20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Iniciar Sesión
      </a>
      <a routerLink="/register" [class.register-btn-nav--inactive]="router.url.startsWith('/login')" class="register-btn-nav">
        Registrarse
      </a>
    } @else {
      <!-- Campana de notificaciones -->
      <button class="icon-btn notif-btn" title="Notificaciones">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" stroke="#374151" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        @if (hasUnreadNotifications) {
          <span class="notif-badge">{{ notificationCount }}</span>
        }
      </button>

      <!-- User menu -->
      <div class="user-menu" [class.user-menu--open]="dropdownOpen">
        <button class="user-btn" (click)="toggleDropdown()" aria-haspopup="menu" [attr.aria-expanded]="dropdownOpen">
          <div class="user-avatar">
            @if (userAvatarUrl) {
              <img [src]="userAvatarUrl" [alt]="'Avatar de ' + userDisplayName" />
            } @else {
              <svg class="user-avatar-placeholder" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="12" cy="9" r="4" stroke="currentColor" stroke-width="1.4"/>
                <path d="M5 20c0-3.2 3.1-5.5 7-5.5s7 2.3 7 5.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            }
          </div>
          <span class="user-name">{{ userDisplayName }}</span>
        </button>

        @if (dropdownOpen) {
          <div class="dropdown" role="menu">
            <p class="dropdown-title">Mi Cuenta</p>
            <a routerLink="/perfil" class="dropdown-item" (click)="dropdownOpen = false">
              <svg viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
                <path d="M4 20C4 16.686 7.582 14 12 14C16.418 14 20 16.686 20 20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              Mi Perfil
            </a>
            <a routerLink="/negocios" class="dropdown-item" (click)="dropdownOpen = false">
              Volver a la tienda
            </a>
            <button class="dropdown-item dropdown-item--danger" (click)="logout()">
              Cerrar Sesión
            </button>
          </div>
        }
      </div>
    }
  </div>
</nav>
