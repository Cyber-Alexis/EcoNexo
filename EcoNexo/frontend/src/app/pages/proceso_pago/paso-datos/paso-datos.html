<div class="step-card">
  <div class="step-header">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22">
      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
      <circle cx="12" cy="10" r="3"/>
    </svg>
    <h2>Información de Contacto</h2>
  </div>

  <form [formGroup]="form" (ngSubmit)="onContinuar()" novalidate>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Nombre completo <span class="required">*</span></label>
        <input
          class="form-input"
          [class.invalid]="isFieldInvalid('name')"
          [class.valid]="isFieldValid('name')"
          formControlName="name"
          type="text"
          placeholder="Tu nombre"
        />
        @if (isFieldInvalid('name')) {
          <span class="error-msg">{{ getErrorMessage('name') }}</span>
        }
      </div>
      <div class="form-group">
        <label class="form-label">Email <span class="required">*</span></label>
        <input
          class="form-input"
          [class.invalid]="isFieldInvalid('email')"
          [class.valid]="isFieldValid('email')"
          formControlName="email"
          type="email"
          placeholder="tu@email.com"
        />
        @if (isFieldInvalid('email')) {
          <span class="error-msg">{{ getErrorMessage('email') }}</span>
        }
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Teléfono <span class="required">*</span></label>
      <input
        class="form-input"
        [class.invalid]="isFieldInvalid('phone')"
        [class.valid]="isFieldValid('phone')"
        formControlName="phone"
        type="tel"
        placeholder="+34 600 000 000"
      />
      @if (isFieldInvalid('phone')) {
        <span class="error-msg">{{ getErrorMessage('phone') }}</span>
      }
    </div>

    <div class="form-group">
      <label class="form-label">Notas adicionales</label>
      <textarea
        class="form-textarea"
        formControlName="notes"
        placeholder="Instrucciones especiales, alergias, etc."
        rows="4"
      ></textarea>
    </div>

    <div class="step-actions step-actions--end">
      <button type="submit" class="btn-primary">
        Continuar
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </div>
  </form>
</div>
