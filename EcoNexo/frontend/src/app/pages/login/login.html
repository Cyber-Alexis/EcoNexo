
<!-- Hero Section -->
<section class="hero">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-right">
      <div class="auth-card">

        <div class="card-header">
          <h1 class="card-title">Iniciar Sesión</h1>
          <p class="card-subtitle">Accede a tu cuenta de EcoNexo</p>
        </div>

        <div class="tab-switcher">
          <button class="tab tab--active" type="button">Iniciar Sesión</button>
          <a class="tab" routerLink="/register/cliente">Registrarse</a>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">

          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input
              id="email"
              type="email"
              formControlName="email"
              placeholder="tu@email.com"
              [class.input--error]="email.invalid && email.touched"
            />
            @if (email.invalid && email.touched) {
              <span class="field-error">Introduce un correo electrónico válido.</span>
            }
          </div>

          <div class="form-group">
            <div class="label-row">
              <label for="password">Contraseña</label>
              <a routerLink="/forgot-password" class="forgot-link">¿Olvidaste tu contraseña?</a>
            </div>
            <div class="password-field">
              <input
                id="password"
                [type]="showPassword ? 'text' : 'password'"
                formControlName="password"
                [class.input--error]="password.invalid && password.touched"
              />
              <button
                type="button"
                class="password-toggle"
                [class.is-active]="showPassword"
                (click)="togglePasswordVisibility()"
                [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
                [attr.aria-pressed]="showPassword"
              >
                <i [class]="showPassword ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye'" aria-hidden="true"></i>
              </button>
            </div>
            @if (password.invalid && password.touched) {
              <span class="field-error">La contraseña debe tener al menos 6 caracteres.</span>
            }
          </div>

          @if (message) {
            <p class="submit-message">{{ message }}</p>
          }

          <button type="submit" class="submit-btn" [disabled]="isLoading">
            @if (isLoading) {
              Cargando...
            } @else {
              Iniciar Sesión
            }
          </button>

        </form>

      </div>
    </div>
  </div>
</section>
