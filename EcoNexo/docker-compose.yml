version: '3.8'
name: EcoNexo


services:
  # Servicio Frontend - Angular
  frontend:
    image: node:20-alpine
    container_name: angular-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "4200:4200"
    command: sh -c "npm install && npm start -- --host 0.0.0.0 --poll 2000"
    networks:
      - app-network
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true

  ngrok:
    image: ngrok/ngrok:latest
    container_name: econexo-ngrok
    depends_on:
      - frontend
    env_file:
      - ../.env
    entrypoint:
      - /bin/sh
      - -c
    command:
      - ngrok http --authtoken=$$NGROK_TOKEN --log=stdout frontend:4200
    ports:
      - "4040:4040"
    networks:
      - app-network

  # Servicio Backend - Laravel
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laravel-backend
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:80"
    environment:
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=laravel_db
      - DB_USERNAME=laravel_user
      - DB_PASSWORD=laravel_password
      - FILESYSTEM_DISK=public
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        php artisan serve --host=0.0.0.0 --port=80
      "

  # Servicio Base de Datos - MySQL
  db:
    image: mysql:8.0
    container_name: mysql-database
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: laravel_db
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data-econexo:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data-econexo:

networks:
  app-network:
    driver: bridge